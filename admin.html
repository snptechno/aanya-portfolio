<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Inbox | Aanya Sharma</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Site navigation: sticks to the top of the viewport when you scroll -->
  <nav class="site-nav" aria-label="Main navigation">

    <!-- Brand name on the left — links back to the home page -->
    <a href="index.html" class="site-nav__brand">Aanya Sharma</a>

    <button
      type="button"
      class="site-nav__toggle"
      aria-expanded="false"
      aria-controls="site-nav-menu"
      aria-label="Open navigation menu"
    >
      <span class="site-nav__toggle-icon site-nav__toggle-icon--menu" aria-hidden="true">☰</span>
      <span class="site-nav__toggle-icon site-nav__toggle-icon--close" aria-hidden="true">✕</span>
    </button>

    <!-- Main page links — dropdown panel on small screens -->
    <div id="site-nav-menu" class="site-nav__menu">
      <ul class="site-nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>
      <button type="button" class="theme-toggle" aria-label="Switch to dark mode">
        <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      </button>
    </div>

  </nav>

  <main class="admin">
    <header class="admin-header">
      <h1 class="admin-header__title">Inbox</h1>
      <p class="admin-header__subtitle">All contact-form messages, newest first.</p>
    </header>

    <section class="admin-toolbar" aria-label="Inbox controls">
      <p id="admin-total-count" class="admin-toolbar__count">📬 0 messages</p>

      <label class="admin-toggle" for="admin-unread-only">
        <span class="admin-toggle__label">Unread only</span>
        <input id="admin-unread-only" class="admin-toggle__input" type="checkbox">
        <span class="admin-toggle__ui" aria-hidden="true"></span>
      </label>
    </section>

    <section>
      <div id="admin-inbox-grid" class="admin-grid" aria-live="polite"></div>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
